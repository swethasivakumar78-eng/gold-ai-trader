<!DOCTYPE html>
<html>
<head>
    <title>Gold AI Trader</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body style="font-family: Arial; background:#0f172a; color:white;">

    <h1 style="text-align:center;">💰 GOLD AI TRADER</h1>

    <!-- INPUT + BUTTONS -->
    <div style="text-align:center; margin:20px;">
        <input type="number" id="investment" placeholder="Enter Investment ₹" style="padding:10px; width:200px;">

        <br><br>

        <button onclick="startTrading()">Start</button>
        <button onclick="runStep()">Run Step</button>
        <button onclick="downloadReport()">Download Report</button>
    </div>

    <!-- STATUS -->
    <div style="display:flex; justify-content:space-around; margin-top:20px;">
        <div>💰 Price: ₹ <span id="price">0</span></div>
        <div>⚡ Action: <span id="action">-</span></div>
        <div>🎯 Reward: <span id="reward">0</span></div>
    </div>

    <!-- CHART -->
    <div style="width:70%; margin:auto; margin-top:30px;">
        <canvas id="chart"></canvas>
    </div>

    <!-- PORTFOLIO -->
    <div style="display:flex; justify-content:space-around; margin-top:40px;">

        <div style="background:#1e293b; padding:20px; border-radius:10px;">
            <h3>📊 Portfolio</h3>
            <p>Balance: ₹ <span id="balance">0</span></p>
            <p>Gold: <span id="gold">0</span> g</p>
            <p>Profit: ₹ <span id="profit">0</span></p>
        </div>

        <div style="background:#1e293b; padding:20px; border-radius:10px;">
            <h3>🤖 AI Explanation</h3>
            <p id="explanation">Waiting for action...</p>
        </div>

    </div>

    <!-- JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
